[env:heltec_wireless_tracker]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=1
    ; Configuración TFT_eSPI para Heltec Wireless Tracker
    -D USER_SETUP_LOADED=1
    -D ST7735_DRIVER=1
    -D TFT_WIDTH=80
    -D TFT_HEIGHT=160
    -D ST7735_GREENTAB160x80=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_MOSI=42
    -D TFT_SCLK=41
    -D TFT_CS=38
    -D TFT_DC=40
    -D TFT_RST=39
    ; -D TFT_BL=21 ; Eliminado para controlarlo manualmente como VEXT
    -D TFT_INVERSION_ON
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SPI_FREQUENCY=27000000
    -D USE_HSPI_PORT=1

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    mikalhart/TinyGPSPlus @ ^1.0.3
    bodmer/TFT_eSPI @ ^2.5.31
